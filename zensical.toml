[project]
site_name        = "The Curator"
site_url         = "https://the-curator.thewintershadow.com"
site_description = "AI-powered podcast generation via MCP — give it a topic, get a fully voiced episode back."
site_author      = "TheWinterShadow"
copyright        = "Copyright &copy; 2026 TheWinterShadow &mdash; MIT License"
repo_name        = "TheWinterShadow/The-Curator"
repo_url         = "https://github.com/TheWinterShadow/The-Curator"
edit_uri         = "edit/main/docs/"

nav = [
  { "🏠 Home" = "index.md" },
  { "🏗️ Overview" = [
    { "Introduction" = "overview/index.md" },
    { "Architecture" = "overview/architecture.md" }
  ]},
  { "🚀 Getting Started" = [
    { "Quick Start" = "getting-started/index.md" },
    { "Installation" = "getting-started/installation.md" },
    { "MCP Clients" = "getting-started/mcp-clients.md" }
  ]},
  { "⚙️ Configuration" = "configuration/index.md" },
  { "☁️ Infrastructure" = [
    { "Overview" = "infrastructure/index.md" },
    { "Docker" = "infrastructure/docker.md" },
    { "Terraform" = "infrastructure/terraform.md" }
  ]},
  { "🤝 Contributing" = [
    { "Guide" = "contributing/index.md" },
    { "Development" = "contributing/development.md" }
  ]},
  { "📚 API Reference" = [
    { "Server" = "api/main.md" },
    { "Podcast Generation" = "api/podcast_generation.md" },
    { "Auth" = [
      { "Google OAuth Provider" = "api/auth/provider.md" }
    ]},
    { "Utils" = [
      { "Vertex Client" = "api/utils/vertex_client.md" }
    ]}
  ]}
]

[project.plugins.search]
[project.plugins.autorefs]

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]
[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
show_source = false
show_root_heading = true
show_signature_annotations = true
show_if_no_docstring = true
members_order = "source"
show_bases = false

# ── Markdown extensions ──────────────────────────────────────────────────────

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.betterem]
smart_enable = "all"

[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index     = "zensical.extensions.emoji.twemoji"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums     = true
line_spans          = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.pymdownx.tilde]

# ── Theme ────────────────────────────────────────────────────────────────────

[project.theme]
name = "material"
features = [
  # Instant SPA navigation
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.tracking",
  # Navigation layout
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.sections",
  "navigation.path",
  "navigation.indexes",
  "navigation.top",
  "navigation.footer",
  # Search
  "search.highlight",
  "search.share",
  "search.suggest",
  # Code blocks
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  # Tabs
  "content.tabs.link",
  # TOC
  "toc.follow",
]

[project.theme.icon]
logo = "fontawesome/solid/scroll"
repo = "fontawesome/brands/github"
edit = "lucide/pencil"
view = "lucide/eye"

# ── Color palettes (respects system preference) ──────────────────────────────

[[project.theme.palette]]
media       = "(prefers-color-scheme: light)"
scheme      = "default"
primary     = "teal"
accent      = "teal"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media       = "(prefers-color-scheme: dark)"
scheme      = "slate"
primary     = "teal"
accent      = "teal"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# ── Footer social links ───────────────────────────────────────────────────────

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/TheWinterShadow/The-Curator"
name = "GitHub"
